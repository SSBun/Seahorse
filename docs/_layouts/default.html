<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title | default: "Seahorse" }}</title>
    <meta name="description" content="{{ page.description | default: 'An elegant macOS material collection and management tool.' }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #E8FF6B;
            --primary-dim: #C8DB5A;
            --secondary: #FF6B6B;
            --accent: #A78BFA;
            --background: #0C0C0E;
            --surface: #141416;
            --surface-elevated: #1C1C1F;
            --surface-hover: #242428;
            --text: #FAFAFA;
            --text-secondary: #A1A1AA;
            --text-muted: #71717A;
            --border: #27272A;
            --border-light: #3F3F46;
            --highlight: #FAFAFA;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--background);
            color: var(--text);
            line-height: 1.6;
            overflow-x: hidden;
        }

        .bg-effects {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .bg-noise {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0.03;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
        }

        .bg-gradient {
            position: absolute;
            width: 800px;
            height: 800px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(232, 255, 107, 0.08) 0%, transparent 70%);
            top: -300px;
            right: -200px;
            animation: drift 30s ease-in-out infinite;
        }

        .bg-gradient-2 {
            position: absolute;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255, 107, 107, 0.06) 0%, transparent 70%);
            bottom: -200px;
            left: -100px;
            animation: drift 25s ease-in-out infinite reverse;
        }

        @keyframes drift {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            33% { transform: translate(30px, -30px) rotate(5deg); }
            66% { transform: translate(-20px, 20px) rotate(-3deg); }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 24px;
            position: relative;
            z-index: 1;
        }

        header {
            padding: 20px 0;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            background: rgba(12, 12, 14, 0.8);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid transparent;
        }

        header.scrolled {
            border-bottom-color: var(--border);
        }

        header .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 22px;
            font-weight: 600;
            color: var(--text);
            text-decoration: none;
            letter-spacing: -0.02em;
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            background: var(--text);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            position: relative;
            overflow: hidden;
        }

        .logo-icon::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .logo:hover .logo-icon::before {
            opacity: 1;
        }

        .logo-icon span {
            position: relative;
            z-index: 1;
        }

        nav {
            display: flex;
            gap: 40px;
            align-items: center;
        }

        nav a {
            color: var(--text-secondary);
            text-decoration: none;
            font-weight: 500;
            font-size: 14px;
            transition: color 0.2s;
            position: relative;
            letter-spacing: -0.01em;
        }

        nav a:hover {
            color: var(--text);
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 12px 24px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 14px;
            text-decoration: none;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            border: none;
            font-family: inherit;
            letter-spacing: -0.01em;
            position: relative;
        }

        .btn:active {
            transform: scale(0.97);
        }

        .btn-primary {
            background: var(--primary);
            color: var(--background);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(232, 255, 107, 0.3);
        }

        .btn-primary svg {
            transition: transform 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .btn-primary:hover svg {
            transform: translateY(-1px);
        }

        .btn-secondary {
            background: var(--surface-elevated);
            color: var(--text);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            background: var(--surface-hover);
            border-color: var(--border-light);
        }

        footer {
            padding: 80px 0;
            border-top: 1px solid var(--border);
            background: var(--surface);
            margin-top: 120px;
        }

        footer .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 24px;
        }

        footer p {
            color: var(--text-muted);
            font-size: 14px;
        }

        footer a {
            color: var(--text-secondary);
            text-decoration: none;
            transition: color 0.2s;
        }

        footer a:hover {
            color: var(--text);
        }

        .footer-links {
            display: flex;
            gap: 32px;
        }

        @media (max-width: 768px) {
            nav {
                display: none;
            }

            footer .container {
                flex-direction: column;
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <div class="bg-effects">
        <div class="bg-noise"></div>
        <div class="bg-gradient"></div>
        <div class="bg-gradient-2"></div>
    </div>

    <header>
        <div class="container">
            <a href="{{ '/' | relative_url }}" class="logo">
                <div class="logo-icon"><span>🐴</span></div>
                Seahorse
            </a>
            <nav>
                <a href="#features">Features</a>
                <a href="#how-it-works">How It Works</a>
                <a href="#installation">Installation</a>
                <a href="https://github.com/SSBun/Seahorse" target="_blank">GitHub</a>
                <a href="https://github.com/SSBun/Seahorse/releases" class="btn btn-primary">
                    Download
                </a>
            </nav>
        </div>
    </header>

    {{ content }}

    <footer>
        <div class="container">
            <a href="{{ '/' | relative_url }}" class="logo">
                <div class="logo-icon"><span style="font-size:18px;">🐴</span></div>
                Seahorse
            </a>
            <div class="footer-links">
                <a href="https://github.com/SSBun/Seahorse">GitHub</a>
                <a href="https://github.com/SSBun/Seahorse/releases">Releases</a>
                <a href="https://github.com/SSBun/Seahorse/issues">Support</a>
            </div>
            <p>&copy; 2024 Seahorse. Open source, forever free.</p>
        </div>
    </footer>

    <script>
        // Header scroll effect
        window.addEventListener('scroll', () => {
            const header = document.querySelector('header');
            if (window.scrollY > 50) {
                header.classList.add('scrolled');
            } else {
                header.classList.remove('scrolled');
            }
        });

        // Smooth scroll for anchor links
        document.querySelectorAll('a[href^="#"]').forEach(anchor => {
            anchor.addEventListener('click', function(e) {
                e.preventDefault();
                const target = document.querySelector(this.getAttribute('href'));
                if (target) {
                    target.scrollIntoView({ behavior: 'smooth', block: 'start' });
                }
            });
        });

        // Intersection Observer for scroll animations
        const observerOptions = {
            threshold: 0.1,
            rootMargin: '0px 0px -50px 0px'
        };

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('animate-in');
                }
            });
        }, observerOptions);

        document.querySelectorAll('.feature-card, .step, .use-case-card, .stat-item').forEach(el => {
            el.style.opacity = '0';
            el.style.transform = 'translateY(30px)';
            el.style.transition = 'opacity 0.6s cubic-bezier(0.4, 0, 0.2, 1), transform 0.6s cubic-bezier(0.4, 0, 0.2, 1)';
            observer.observe(el);
        });

        // Add animate-in class styles
        document.addEventListener('DOMContentLoaded', () => {
            const style = document.createElement('style');
            style.textContent = `
                .animate-in {
                    opacity: 1 !important;
                    transform: translateY(0) !important;
                }
            `;
            document.head.appendChild(style);

            // Easter egg: Konami code for a surprise
            const konamiCode = ['ArrowUp', 'ArrowUp', 'ArrowDown', 'ArrowDown', 'ArrowLeft', 'ArrowRight', 'ArrowLeft', 'ArrowRight', 'b', 'a'];
            let konamiIndex = 0;

            document.addEventListener('keydown', (e) => {
                if (e.key === konamiCode[konamiIndex]) {
                    konamiIndex++;
                    if (konamiIndex === konamiCode.length) {
                        // Trigger surprise!
                        document.body.style.transition = 'transform 0.5s';
                        document.body.style.transform = 'rotate(1deg)';
                        setTimeout(() => {
                            document.body.style.transform = 'rotate(-1deg)';
                            setTimeout(() => {
                                document.body.style.transform = '';
                            }, 200);
                        }, 200);
                        konamiIndex = 0;
                    }
                } else {
                    konamiIndex = 0;
                }
            });
        });
    </script>
</body>
</html>
